<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fond -->
  <rect width="200" height="200" rx="18" fill="#0d1b2a"/>

  <!-- Écran / PC -->
  <rect x="35" y="40" width="130" height="90" rx="6" fill="#1a3a5c" stroke="#00b4ff" stroke-width="2.5"/>
  <rect x="45" y="50" width="110" height="70" rx="3" fill="#0a0f1e"/>
  <!-- Pied écran -->
  <rect x="88" y="130" width="24" height="12" rx="2" fill="#1a3a5c" stroke="#00b4ff" stroke-width="2"/>
  <rect x="70" y="142" width="60" height="6" rx="3" fill="#1a3a5c" stroke="#00b4ff" stroke-width="2"/>

  <!-- Flèche de téléchargement animée -->
  <line x1="100" y1="58" x2="100" y2="88" stroke="#00e696" stroke-width="3" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <polyline points="87,78 100,92 113,78" fill="none" stroke="#00e696" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </polyline>

  <!-- Barre de progression -->
  <rect x="55" y="100" width="90" height="10" rx="5" fill="#0d1b2a" stroke="#00b4ff" stroke-width="1.5"/>
  <rect x="55" y="100" width="65" height="10" rx="5" fill="#00b4ff" opacity="0.8">
    <animate attributeName="width" values="0;90;90" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Engrenage (pilote / driver) -->
  <g transform="translate(155, 155)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#ffa000" stroke-width="2.5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="5" fill="#1a3a5c" stroke="#ffa000" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Dents engrenage -->
    <g stroke="#ffa000" stroke-width="2.5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      <line x1="0" y1="-10" x2="0" y2="-14"/>
      <line x1="0" y1="10" x2="0" y2="14"/>
      <line x1="-10" y1="0" x2="-14" y2="0"/>
      <line x1="10" y1="0" x2="14" y2="0"/>
      <line x1="-7" y1="-7" x2="-10" y2="-10"/>
      <line x1="7" y1="7" x2="10" y2="10"/>
      <line x1="7" y1="-7" x2="10" y2="-10"/>
      <line x1="-7" y1="7" x2="-10" y2="10"/>
    </g>
  </g>

  <!-- Texte -->
  <text x="100" y="185" text-anchor="middle" fill="#c8d8f0" font-family="Arial, sans-serif" font-size="9" font-weight="bold" letter-spacing="1.5" opacity="0.8">INSTALLATION PILOTE</text>
</svg>
