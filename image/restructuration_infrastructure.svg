<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200">
  <!-- Fond -->
  <rect width="240" height="200" rx="18" fill="#0d1b2a"/>

  <!-- ══ ANCIEN (gauche, rouge) ══ -->
  <!-- Serveur vieux -->
  <rect x="12" y="30" width="50" height="12" rx="3" fill="#1a3a5c" stroke="#ff4444" stroke-width="1.5" opacity="0.7"/>
  <rect x="12" y="46" width="50" height="12" rx="3" fill="#1a3a5c" stroke="#ff4444" stroke-width="1.5" opacity="0.7"/>
  <!-- Switch vieux -->
  <rect x="15" y="75" width="44" height="10" rx="3" fill="#1a3a5c" stroke="#ff4444" stroke-width="1.5" opacity="0.7"/>
  <!-- Câbles désordonnés -->
  <path d="M36 58 Q20 68 28 75" fill="none" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
  <path d="M46 58 Q60 65 55 75" fill="none" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
  <path d="M36 58 Q55 62 55 75" fill="none" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- PC clients vieux -->
  <rect x="12" y="100" width="16" height="12" rx="2" fill="#1a3a5c" stroke="#ff4444" stroke-width="1.5" opacity="0.7"/>
  <rect x="34" y="100" width="16" height="12" rx="2" fill="#1a3a5c" stroke="#ff4444" stroke-width="1.5" opacity="0.7"/>
  <rect x="56" y="100" width="16" height="12" rx="2" fill="#1a3a5c" stroke="#ff4444" stroke-width="1.5" opacity="0.7"/>
  <!-- Liaisons pc switch désordonnées -->
  <line x1="20" y1="100" x2="37" y2="85" stroke="#ff4444" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="42" y1="100" x2="37" y2="85" stroke="#ff4444" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="64" y1="100" x2="55" y2="85" stroke="#ff4444" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  <!-- Croix suppression -->
  <line x1="10" y1="28" x2="76" y2="122" stroke="#ff4444" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="76" y1="28" x2="10" y2="122" stroke="#ff4444" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

  <!-- ══ FLÈCHE CENTRALE ══ -->
  <line x1="96" y1="80" x2="142" y2="80" stroke="#ffa000" stroke-width="3" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
  </line>
  <polyline points="134,72 144,80 134,88" fill="none" stroke="#ffa000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
  </polyline>
  <!-- Label -->
  <text x="119" y="70" text-anchor="middle" fill="#ffa000" font-family="Arial, sans-serif" font-size="8" font-weight="bold" letter-spacing="1" opacity="0.8">REFONTE</text>

  <!-- ══ NOUVEAU (droite, propre) ══ -->
  <!-- Cloud / Internet en haut -->
  <ellipse cx="195" cy="28" rx="22" ry="12" fill="#1a3a5c" stroke="#00b4ff" stroke-width="2"/>
  <ellipse cx="183" cy="32" rx="12" ry="9" fill="#1a3a5c" stroke="#00b4ff" stroke-width="2"/>
  <ellipse cx="207" cy="32" rx="12" ry="9" fill="#1a3a5c" stroke="#00b4ff" stroke-width="2"/>
  <rect x="170" y="30" width="50" height="10" rx="0" fill="#1a3a5c"/>
  <text x="195" y="36" text-anchor="middle" fill="#00b4ff" font-family="Arial, sans-serif" font-size="8" font-weight="bold">WAN</text>

  <!-- Routeur -->
  <rect x="175" y="52" width="40" height="14" rx="4" fill="#1a3a5c" stroke="#00e696" stroke-width="2"/>
  <circle cx="186" cy="59" r="2.5" fill="#00e696">
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="195" cy="59" r="2.5" fill="#00e696">
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="204" cy="59" r="2.5" fill="#ffa000">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  <text x="195" y="73" text-anchor="middle" fill="#00e696" font-family="Arial, sans-serif" font-size="7" opacity="0.7">ROUTEUR</text>

  <!-- Ligne cloud → routeur -->
  <line x1="195" y1="40" x2="195" y2="52" stroke="#00b4ff" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Switch core -->
  <rect x="165" y="88" width="60" height="14" rx="4" fill="#1a3a5c" stroke="#00b4ff" stroke-width="2"/>
  <rect x="172" y="92" width="6" height="6" rx="1" fill="#0a0f1e" stroke="#00b4ff" stroke-width="1"/>
  <rect x="182" y="92" width="6" height="6" rx="1" fill="#0a0f1e" stroke="#00b4ff" stroke-width="1"/>
  <rect x="192" y="92" width="6" height="6" rx="1" fill="#0a0f1e" stroke="#00b4ff" stroke-width="1"/>
  <rect x="202" y="92" width="6" height="6" rx="1" fill="#0a0f1e" stroke="#00b4ff" stroke-width="1"/>
  <rect x="212" y="92" width="6" height="6" rx="1" fill="#0a0f1e" stroke="#ffa000" stroke-width="1"/>
  <text x="195" y="111" text-anchor="middle" fill="#00b4ff" font-family="Arial, sans-serif" font-size="7" opacity="0.7">SWITCH CORE</text>

  <!-- Ligne routeur → switch -->
  <line x1="195" y1="66" x2="195" y2="88" stroke="#00e696" stroke-width="1.5"/>

  <!-- PC clients nouveaux — bien alignés -->
  <rect x="163" y="125" width="14" height="10" rx="2" fill="#1a3a5c" stroke="#00b4ff" stroke-width="1.5"/>
  <rect x="181" y="125" width="14" height="10" rx="2" fill="#1a3a5c" stroke="#00b4ff" stroke-width="1.5"/>
  <rect x="199" y="125" width="14" height="10" rx="2" fill="#1a3a5c" stroke="#00b4ff" stroke-width="1.5"/>
  <rect x="217" y="125" width="14" height="10" rx="2" fill="#1a3a5c" stroke="#00b4ff" stroke-width="1.5"/>
  <!-- Liaisons propres switch → PC -->
  <line x1="170" y1="102" x2="170" y2="125" stroke="#00b4ff" stroke-width="1.5"/>
  <line x1="185" y1="102" x2="188" y2="125" stroke="#00b4ff" stroke-width="1.5"/>
  <line x1="200" y1="102" x2="206" y2="125" stroke="#00b4ff" stroke-width="1.5"/>
  <line x1="215" y1="102" x2="224" y2="125" stroke="#00b4ff" stroke-width="1.5"/>

  <!-- Texte bas -->
  <text x="120" y="180" text-anchor="middle" fill="#c8d8f0" font-family="Arial, sans-serif" font-size="9" font-weight="bold" letter-spacing="1" opacity="0.8">RESTRUCTURATION INFRASTRUCTURE</text>
</svg>
