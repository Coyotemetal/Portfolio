<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200">
  <!-- Fond -->
  <rect width="240" height="200" rx="18" fill="#0d1b2a"/>

  <!-- ══ FEUILLE AU CENTRE ══ -->
  <rect x="90" y="55" width="60" height="75" rx="4" fill="#1a3a5c" stroke="#c8d8f0" stroke-width="2"/>
  <!-- Coin plié -->
  <polyline points="132,55 145,55 145,68 132,68 132,55" fill="#0d1b2a" stroke="#c8d8f0" stroke-width="2"/>
  <!-- Lignes de texte sur la feuille -->
  <line x1="100" y1="78" x2="132" y2="78" stroke="#c8d8f0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="100" y1="88" x2="135" y2="88" stroke="#c8d8f0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="100" y1="98" x2="128" y2="98" stroke="#c8d8f0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Ligne de scan animée sur la feuille -->
  <rect x="90" y="55" width="55" height="75" rx="4" fill="none" clip-path="url(#clip_sheet)"/>
  <clipPath id="clip_sheet">
    <rect x="90" y="55" width="55" height="75"/>
  </clipPath>
  <line x1="90" y1="75" x2="145" y2="75" stroke="#00b4ff" stroke-width="2" opacity="0.8">
    <animate attributeName="y1" values="58;128;58" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="58;128;58" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/>
  </line>

  <!-- ══ FLÈCHE GAUCHE → DOSSIER ══ -->
  <line x1="88" y1="110" x2="55" y2="138" stroke="#ffa000" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="5,3">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </line>
  <polyline points="48,130 55,140 65,134" fill="none" stroke="#ffa000" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Dossier (gauche) -->
  <path d="M18 148 Q18 140 25 140 L48 140 L53 134 L78 134 Q85 134 85 141 L85 168 Q85 175 78 175 L25 175 Q18 175 18 168 Z" fill="#1a3a5c" stroke="#ffa000" stroke-width="2"/>
  <line x1="18" y1="148" x2="85" y2="148" stroke="#ffa000" stroke-width="1.5" opacity="0.4"/>

  <!-- ══ FLÈCHE DROITE → MAIL ══ -->
  <line x1="152" y1="110" x2="185" y2="138" stroke="#00e696" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="5,3">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </line>
  <polyline points="175,134 185,140 192,130" fill="none" stroke="#00e696" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Enveloppe (droite) -->
  <rect x="155" y="134" width="67" height="44" rx="5" fill="#1a3a5c" stroke="#00e696" stroke-width="2"/>
  <polyline points="155,134 188,158 222,134" fill="none" stroke="#00e696" stroke-width="2" stroke-linejoin="round"/>

  <!-- Texte -->
  <text x="120" y="195" text-anchor="middle" fill="#c8d8f0" font-family="Arial, sans-serif" font-size="10" font-weight="bold" letter-spacing="1.5" opacity="0.7">RICOH SCAN</text>
</svg>
