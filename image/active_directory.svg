<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fond -->
  <rect width="200" height="200" rx="18" fill="#0d1b2a"/>

  <!-- ══ SERVEUR AD (centre haut) ══ -->
  <rect x="75" y="18" width="50" height="32" rx="5" fill="#1a3a5c" stroke="#00b4ff" stroke-width="2"/>
  <rect x="82" y="24" width="22" height="6" rx="2" fill="#0a0f1e" stroke="#00b4ff" stroke-width="1" opacity="0.7"/>
  <circle cx="116" cy="27" r="2.5" fill="#00e696">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="116" cy="36" r="2.5" fill="#ffa000">
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <!-- Label AD -->
  <text x="100" y="60" text-anchor="middle" fill="#00b4ff" font-family="Arial, sans-serif" font-size="8" font-weight="bold" letter-spacing="1">AD DS</text>

  <!-- ══ LIGNES DE CONNEXION ══ -->
  <!-- Serveur → DNS -->
  <line x1="75" y1="40" x2="38" y2="90" stroke="#00b4ff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
  </line>
  <!-- Serveur → DHCP -->
  <line x1="100" y1="50" x2="100" y2="95" stroke="#00b4ff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </line>
  <!-- Serveur → GPO -->
  <line x1="125" y1="40" x2="162" y2="90" stroke="#00b4ff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </line>

  <!-- ══ DNS (gauche) ══ -->
  <circle cx="35" cy="105" r="22" fill="#1a3a5c" stroke="#00e696" stroke-width="2"/>
  <ellipse cx="35" cy="105" rx="10" ry="22" fill="none" stroke="#00e696" stroke-width="1.2" opacity="0.5"/>
  <line x1="13" y1="98" x2="57" y2="98" stroke="#00e696" stroke-width="1.2" opacity="0.4"/>
  <line x1="13" y1="105" x2="57" y2="105" stroke="#00e696" stroke-width="1.2" opacity="0.4"/>
  <line x1="13" y1="112" x2="57" y2="112" stroke="#00e696" stroke-width="1.2" opacity="0.4"/>
  <text x="35" y="138" text-anchor="middle" fill="#00e696" font-family="Arial, sans-serif" font-size="8" font-weight="bold">DNS</text>

  <!-- ══ DHCP (centre) ══ -->
  <rect x="78" y="95" width="44" height="30" rx="5" fill="#1a3a5c" stroke="#ffa000" stroke-width="2"/>
  <!-- Icône IP -->
  <text x="100" y="108" text-anchor="middle" fill="#ffa000" font-family="Courier New, monospace" font-size="8" font-weight="bold">IP</text>
  <line x1="85" y1="114" x2="115" y2="114" stroke="#ffa000" stroke-width="1.2" opacity="0.5"/>
  <circle cx="89" cy="119" r="2" fill="#ffa000" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="96" cy="119" r="2" fill="#ffa000" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="103" cy="119" r="2" fill="#00e696" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="110" cy="119" r="2" fill="#00e696" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <text x="100" y="140" text-anchor="middle" fill="#ffa000" font-family="Arial, sans-serif" font-size="8" font-weight="bold">DHCP</text>

  <!-- ══ GPO (droite) ══ -->
  <rect x="143" y="88" width="44" height="34" rx="5" fill="#1a3a5c" stroke="#c084fc" stroke-width="2"/>
  <!-- Icône bouclier -->
  <path d="M165 93 L172 97 L172 108 Q165 113 165 113 Q158 108 158 108 L158 97 Z" fill="none" stroke="#c084fc" stroke-width="1.8"/>
  <polyline points="161,103 164,107 170,99" fill="none" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="165" y="133" text-anchor="middle" fill="#c084fc" font-family="Arial, sans-serif" font-size="8" font-weight="bold">GPO</text>

  <!-- ══ UTILISATEURS (bas) ══ -->
  <!-- Ligne connexion bas -->
  <line x1="35" y1="127" x2="65" y2="155" stroke="#00e696" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="125" x2="100" y2="155" stroke="#ffa000" stroke-width="1.2" opacity="0.5"/>
  <line x1="165" y1="122" x2="135" y2="155" stroke="#c084fc" stroke-width="1.2" opacity="0.5"/>

  <!-- 3 users -->
  <circle cx="65" cy="160" r="7" fill="#1a3a5c" stroke="#00e696" stroke-width="1.5"/>
  <line x1="65" y1="167" x2="65" y2="175" stroke="#00e696" stroke-width="1.5"/>
  <line x1="58" y1="170" x2="72" y2="170" stroke="#00e696" stroke-width="1.5"/>

  <circle cx="100" cy="160" r="7" fill="#1a3a5c" stroke="#ffa000" stroke-width="1.5"/>
  <line x1="100" y1="167" x2="100" y2="175" stroke="#ffa000" stroke-width="1.5"/>
  <line x1="93" y1="170" x2="107" y2="170" stroke="#ffa000" stroke-width="1.5"/>

  <circle cx="135" cy="160" r="7" fill="#1a3a5c" stroke="#c084fc" stroke-width="1.5"/>
  <line x1="135" y1="167" x2="135" y2="175" stroke="#c084fc" stroke-width="1.5"/>
  <line x1="128" y1="170" x2="142" y2="170" stroke="#c084fc" stroke-width="1.5"/>

  <!-- Texte bas -->
  <text x="100" y="193" text-anchor="middle" fill="#c8d8f0" font-family="Arial, sans-serif" font-size="9" font-weight="bold" letter-spacing="1.5" opacity="0.8">ACTIVE DIRECTORY</text>
</svg>
