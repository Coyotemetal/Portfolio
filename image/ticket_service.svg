<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fond -->
  <rect width="200" height="200" rx="18" fill="#0d1b2a"/>

  <!-- Ticket principal -->
  <rect x="25" y="55" width="150" height="90" rx="8" fill="#1a3a5c" stroke="#00b4ff" stroke-width="2.5"/>

  <!-- Encoche gauche du ticket -->
  <circle cx="25" cy="100" r="10" fill="#0d1b2a"/>
  <!-- Encoche droite du ticket -->
  <circle cx="175" cy="100" r="10" fill="#0d1b2a"/>

  <!-- Ligne pointillée centrale -->
  <line x1="35" y1="100" x2="165" y2="100" stroke="#00b4ff" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Partie haute ticket — icône check / validation -->
  <circle cx="100" cy="76" r="14" fill="none" stroke="#00e696" stroke-width="2.5"/>
  <polyline points="93,76 98,82 108,69" fill="none" stroke="#00e696" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Partie basse ticket — lignes de texte -->
  <line x1="55" y1="114" x2="145" y2="114" stroke="#c8d8f0" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="124" x2="135" y2="124" stroke="#c8d8f0" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Petit badge numéro en haut à droite -->
  <circle cx="158" cy="62" r="13" fill="#ffa000"/>
  <text x="158" y="67" text-anchor="middle" fill="#0d1b2a" font-family="Arial, sans-serif" font-size="12" font-weight="900">#1</text>

  <!-- Texte -->
  <text x="100" y="168" text-anchor="middle" fill="#c8d8f0" font-family="Arial, sans-serif" font-size="10" font-weight="bold" letter-spacing="2" opacity="0.8">TICKET</text>
</svg>
